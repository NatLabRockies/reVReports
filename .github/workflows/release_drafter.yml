name: Release Drafter

on:
  push:
    branches: [main]

jobs:
  update_release_draft:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Release Drafter
        uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
