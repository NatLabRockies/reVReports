name: Release Drafter

on:
  push:
    branches: [main]

jobs:
  update_release_draft:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Release Drafter
        uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
