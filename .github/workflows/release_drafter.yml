name: Release Drafter

on:
  push:
    branches: [main]

jobs:
  update_release_draft:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Release Drafter
        uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
