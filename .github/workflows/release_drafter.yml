name: Release Drafter

on:
  push:
    branches: [main]

jobs:
  update_release_draft:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Release Drafter
        uses: release-drafter/release-drafter@563bf132657a13ded0b01fcb723c5a58cdd824e2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
